<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BOSS FIGHTS</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" type="image/png" href="/assets/img/bossfights/Favicon.png" />
    <link rel="apple-touch-icon" href="/assets/img/bossfights/Favicon.png" />
    <link rel="preload" as="image" href="/assets/img/bossfights/walkman_nologo.png" fetchpriority="high" />
    <link rel="preload" as="image" href="/assets/img/bossfights/note.png" fetchpriority="high" />
    <link rel="preload" as="image" href="/assets/img/bossfights/mushroom.png" fetchpriority="high" />
    <link rel="preload" as="image" href="/assets/img/bossfights/pause.png" fetchpriority="high" />
    <link rel="preload" as="image" href="/assets/img/bossfights/play.png" fetchpriority="high" />
    <link rel="preload" as="image" href="/assets/img/bossfights/Fman.png" fetchpriority="high" />
    <link rel="preload" as="image" href="/assets/img/bossfights/Favicon.png" />
    <link rel="preload" as="image" href="/assets/img/bossfights/crowd.png" />
    <link rel="preload" as="image" href="/assets/img/bossfights/elevator.png" />
    <link rel="preload" as="image" href="/assets/img/bossfights/gate.png" />
    <link rel="preload" as="image" href="/assets/img/bossfights/hallway.png" />
    <link rel="preload" as="image" href="/assets/img/bossfights/mouse.png" />
    <link rel="preload" as="image" href="/assets/img/bossfights/pow.png" />
    <link rel="preload" as="image" href="/assets/img/bossfights/shadows.png" />
    <link rel="preload" as="image" href="/assets/img/bossfights/waves.png" />
    <link rel="preload" as="image" href="/assets/img/bossfights/boulder.png" />
    <link rel="preload" as="image" href="/assets/img/bossfights/cane.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Coral+Pixels&family=DotGothic16&display=swap"
      rel="stylesheet"
    />
    <style>
      /* === Base Styles === */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        user-select: none;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f5f5f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        overflow-x: hidden;
      }

      /* === Title === */
      .page-title {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: calc(50vh - 60px);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Coral Pixels", monospace;
        font-size: clamp(2.25rem, 14.5vw, 6rem);
        color: #333;
        text-transform: uppercase;
        letter-spacing: 0em;
        line-height: 1em;
        text-align: center;
        transition: transform 480ms cubic-bezier(0.22, 1, 0, 1.08),
          opacity 360ms ease;
        will-change: transform, opacity;
      }

      /* === Loading Overlay === */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f5f5f0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        font-family: "DotGothic16", monospace;
        font-size: 2rem;
        color: #333;
      }

      .loading-overlay.hidden {
        display: none;
      }

      /* === Player Container === */
      .player-wrapper {
        position: relative;
        display: inline-block;
        transform-origin: center center;
        transition: transform 480ms cubic-bezier(0.22, 1, 0, 1.08);
        will-change: transform;
      }

      .player-image {
        display: block;
        max-width: min(95vw, 900px);
        max-height: 85vh;
        width: auto;
        height: auto;
      }

      .screen-area {
        position: absolute;
        top: 22%;
        left: 22.7%;
        width: 24%;
        height: 49%;
        background: linear-gradient(
          to bottom,
          #353641 0%,
          #38394b 15%,
          #11101b 50%,
          #353648 100%
        );
        border-radius: 5%;
      }

      /* === Screen Overlay === */
      .screen-overlay {
        position: absolute;
        left: 5%;
        top: 9%;
        width: 90%;
        height: 85;
        padding: 0% 1.5%;
        border-radius: 3%;

        background: linear-gradient(
          to bottom,
          rgba(40, 40, 40, 1) 0%,
          rgba(0, 0, 0, 1) 50%,
          rgba(40, 40, 40, 1) 100%
        );

        font-family: "DotGothic16", sans-serif;
        font-weight: 400;
        font-style: normal;

        display: flex;
        flex-direction: column;
        overflow: hidden;

        container-type: inline-size;
      }

      .song-title-container {
        display: flex;
        align-items: center;
        gap: 1%;
      }

      .song-icon {
        width: 17%;
        height: 11.5cqi;
        flex-shrink: 0;
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding-left: 1%;
      }

      .song-icon img {
        width: auto;
        height: 100%;
        object-fit: contain;
      }

      .song-title {
        overflow: hidden;
        color: #fff;
        font-size: 11.5cqi;
        text-transform: uppercase;
        /* letter-spacing: 0.1em; */
        white-space: pre;
        margin-right: 2.2%;
        flex: 1;
      }

      .song-description-container {
        display: flex;
        align-items: center;
        gap: 1%;
        margin-top: -4%;
      }

      .description-icon {
        width: 17%;
        height: 11.5cqi;
        flex-shrink: 0;
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding-left: 1%;
      }

      .description-icon img {
        width: auto;
        height: 100%;
        object-fit: contain;
      }

      .song-description {
        overflow: hidden;
        color: #fff;
        font-size: 11.5cqi;
        margin-right: 2.2%;
        white-space: pre;
        flex: 1;
      }

      .play-status {
        color: #fff;
        font-size: 1.7cqi;
        margin-top: 0.4%;
        display: flex;
        align-items: center;
        gap: 1.5%;
      }

      .play-icon {
        width: 12.5%;
        font-size: 10.5cqi;
        padding: 1%;
      }

      .track-number {
        font-size: 10cqi;
      }

      .repeat-indicator {
        font-size: 10cqi;
        opacity: 0;
        margin-left: auto;
        padding-right: 1%;
      }

      .repeat-indicator.active {
        opacity: 1;
      }

      .error-indicator {
        width: 8cqi;
        height: 8cqi;
        flex: 0 0 8cqi;
        margin-left: 0.5%;
        margin-right: 1%;
        opacity: 0;
      }

      .error-indicator.active {
        opacity: 1;
      }

      .error-indicator svg {
        width: 100%;
        height: 100%;
        display: block;
        shape-rendering: crispEdges;
        image-rendering: pixelated;
      }

      /* === Control Buttons === */
      .controls {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .control-btn {
        position: absolute;
        width: 8%;
        height: 8%;

        background: transparent;
        border: 2px solid transparent;
        border-radius: 50%;

        color: transparent;

        cursor: pointer;
        pointer-events: auto;

        display: flex;
        align-items: center;
        justify-content: center;
      }

      .control-btn.repeat-btn {
        left: 48%;
        top: 74.7%;
        width: 10%;
        height: 12%;
        border: none;
        border-radius: 0;
        z-index: 2;
        font-size: 1.5cqi;
        opacity: 0.4;
      }

      .control-btn.repeat-btn.active {
        opacity: 1;
      }

      .control-btn.repeat-btn svg {
        width: 60%;
        height: 60%;
        fill: #333;
      }

      .control-btn.prev-btn {
left: 59.3%;
    top: 65%;
    width: 16.8%;
    height: 26.8%;
        background: url("/assets/img/bossfights/prev.png") no-repeat center
          center;
        background-size: contain;
        border: none;
        border-radius: 0;
        z-index: 2;
      }

      .control-btn.play-btn {
        left: 58.1%;
        top: 15.7%;
        width: 19.7%;
        height: 68%;
      }

      .control-btn.next-btn {
left: 59.5%;
    top: 9.2%;
    width: 16.8%;
    height: 22.9%;
        background: url("/assets/img/bossfights/next.png") no-repeat center
          center;
        background-size: contain;
        border: none;
        border-radius: 0;
        z-index: 2;
      }

      .control-btn.play-btn.playing {
        border: 1cqi solid #ff333354;
        box-shadow: 0 0 1cqi #ff333354, 0 0 2cqi #ff333354,
          inset 0 0 0.8cqi rgba(255, 51, 51, 0.3);
      }

      /* Hidden audio element */
      audio {
        display: none;
      }

      /* Secret tap zone (logo) */
      .nothing-suspicious {
        position: absolute;
        left: 79.2%;
        top: 30%;
        width: 18%;
        height: 40%;
        object-fit: contain;
        cursor: default;
        z-index: 2;
        -webkit-tap-highlight-color: transparent;
        transform: scale(.9) rotate(13deg);
        filter: brightness(0.85);
      }

      /* === Progress Bar === */
      .progress-container {
        position: absolute;
        top: 47.7%;
        left: 24.3%;
        width: 20.6%;
        height: 0.75%;
        background-image: linear-gradient(90deg, #fff 25%, transparent 25%),
          linear-gradient(-90deg, #fff 25%, transparent 25%),
          linear-gradient(90deg, transparent 75%, #fff 75%),
          linear-gradient(-90deg, transparent 75%, #fff 75%);
        background-size: 0.35cqi;
        /* background-position: 0 0, 0 .2cqi, .2cqi -.2cqi, -.2cqi 0; */
        background-color: transparent;
        cursor: pointer;
      }

      /* Solid white fill for played portion */
      .progress-fill {
        position: absolute;
        top: 0;
        left: 0;
        width: 0%;
        padding-right: 1%;
        height: 100%;
        background: #fff;
        border-top-left-radius: 0.05cqi;
        border-bottom-left-radius: 0.05cqi;
        will-change: width;
      }

      /* Marker sits at the end of the fill */
      .progress-marker {
        position: absolute;
        top: 50%;
        left: -1.5%;
        width: 1%;
        height: 280%;
        transform: translateY(-50%) translateX(50%);
        background: #fff;
        will-change: left;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
      }

      .progress-loop-marker {
        position: absolute;
        top: 0;
        left: 0;
        width: 0.45cqi;
        height: 100%;
        background: rgb(209 72 28);
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%);
        transition: opacity 120ms ease-out;
      }

      .progress-loop-marker.visible {
        opacity: 1;
      }

      @media (max-width: 768px) {
        body {
          padding: 24px 0;
        }

        body.mobile-playback-active {
          overflow: hidden;
        }

        body.mobile-playback-active .page-title {
          transform: translateY(calc(-100% - 8vh));
          opacity: 0;
          pointer-events: none;
        }

        body.mobile-playback-active .player-wrapper {
          transform: rotate(90deg) scale(var(--mobile-player-scale, 1));
        }
      }
    </style>
  </head>

  <body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay"></div>

    <div class="page-title">BOSS FIGHTS</div>

    <div class="player-wrapper">
      <!-- Base Walkman Image -->
      <img
        src="/assets/img/bossfights/walkman_nologo.png"
        alt="Walkman Music Player"
        class="player-image"
        id="walkmanImage"
        loading="eager"
        fetchpriority="high"
        decoding="async"
      />

      <!-- Screen Overlay -->
      <div class="screen-area">
        <div class="screen-overlay">
          <div class="song-title-container">
            <div class="song-icon">
              <img src="/assets/img/bossfights/note.png" alt="Note" loading="eager" fetchpriority="high" decoding="async" />
            </div>
            <div class="song-title" id="songTitle">Loading...</div>
          </div>
          <div class="song-description-container">
            <div class="description-icon">
              <img
                src="/assets/img/bossfights/mushroom.png"
                alt="Song icon"
                id="songIcon"
                loading="eager"
                fetchpriority="high"
                decoding="async"
              />
            </div>
            <div class="song-description" id="songDescription"></div>
          </div>
          <div class="play-status">
            <img
              class="play-icon"
              id="playIcon"
              src="/assets/img/bossfights/pause.png"
              alt="Paused"
              loading="eager"
              fetchpriority="high"
              decoding="async"
            />
            <span class="track-number" id="trackNumber">001</span>
            <span
              class="error-indicator"
              id="errorIndicator"
              aria-hidden="true"
              title="Track failed to load"
            >
              <svg
                viewBox="0 0 16 16"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <rect x="7" y="2" width="2" height="1" fill="#3b1610"/>
                <rect x="6" y="3" width="4" height="1" fill="#3b1610"/>
                <rect x="5" y="4" width="6" height="2" fill="#3b1610"/>
                <rect x="4" y="6" width="8" height="2" fill="#3b1610"/>
                <rect x="3" y="8" width="10" height="2" fill="#3b1610"/>
                <rect x="2" y="10" width="12" height="2" fill="#3b1610"/>
                <rect x="1" y="12" width="14" height="2" fill="#3b1610"/>
                <rect x="0" y="14" width="16" height="1" fill="#3b1610"/>
                <rect x="7" y="3" width="2" height="1" fill="#ff6a3d"/>
                <rect x="6" y="4" width="4" height="2" fill="#ff6a3d"/>
                <rect x="5" y="6" width="6" height="2" fill="#ff6a3d"/>
                <rect x="4" y="8" width="8" height="2" fill="#ff6a3d"/>
                <rect x="3" y="10" width="10" height="2" fill="#ff6a3d"/>
                <rect x="2" y="12" width="12" height="2" fill="#ff6a3d"/>
                <rect x="7" y="5" width="2" height="4" fill="#fff6cf"/>
                <rect x="7" y="11" width="2" height="1" fill="#fff6cf"/>
              </svg>
            </span>
            <span class="repeat-indicator" id="repeatIndicator">RPT</span>
          </div>
        </div>
      </div>
      <!-- Progress Bar -->
      <div class="progress-container" id="progressContainer">
        <div class="progress-fill" id="progressFill"></div>
        <div
          class="progress-loop-marker"
          id="loopStartMarker"
          aria-hidden="true"
        ></div>
        <div
          class="progress-loop-marker"
          id="loopEndMarker"
          aria-hidden="true"
        ></div>
        <div class="progress-marker" id="progressMarker"></div>
      </div>

      <!-- Secret Tap Zone for mobile unlock -->
      <img
        class="nothing-suspicious"
        id="nothing-suspicious"
        src="/assets/img/bossfights/Fman.png"
        alt=""
        draggable="false"
        loading="eager"
        fetchpriority="high"
        decoding="async"
      />

      <!-- Control Buttons -->
      <div class="controls">
        <button
          class="control-btn repeat-btn"
          id="repeatBtn"
          aria-label="Toggle repeat"
          tabindex="4"
        >
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"
            />
          </svg>
        </button>
        <button
          class="control-btn prev-btn"
          id="prevBtn"
          aria-label="Previous track"
          tabindex="2"
        >
          ⏮
        </button>
        <button
          class="control-btn play-btn"
          id="playBtn"
          aria-label="Play/Pause"
          tabindex="1"
        >
          ▶
        </button>
        <button
          class="control-btn next-btn"
          id="nextBtn"
          aria-label="Next track"
          tabindex="3"
        >
          ⏭
        </button>
      </div>
    </div>

    <!-- Hidden Audio Element -->
    <audio preload="auto" id="audioPlayer"></audio>

    <!-- External JavaScript -->
    <script src="/content/static/favicon-scroller.js"></script>
    <script type="module" src="/content/static/player.js"></script>
  </body>
</html>
